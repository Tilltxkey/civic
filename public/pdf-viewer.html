<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PDF Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #E8E6E1; }
    #scroll {
      width: 100%; height: 100vh;
      overflow-y: auto; overflow-x: auto;
      display: flex; flex-direction: column;
      align-items: flex-start;
      padding: 12px; gap: 12px;
    }
    canvas {
      display: block;
      box-shadow: 0 2px 16px rgba(0,0,0,.18);
      background: #fff;
      flex-shrink: 0;
    }
    #loading {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 12px;
      background: #F4F3F0;
      font-family: system-ui, sans-serif;
      font-size: 14px; color: #6B6A64;
      z-index: 10;
    }
    .spinner {
      width: 32px; height: 32px; border-radius: 50%;
      border: 3px solid #E2E0DA;
      border-top-color: #C47F00;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #zoom-overlay {
      display: none; position: fixed; inset: 0; z-index: 5;
      background: rgba(232,230,225,0.7);
      align-items: center; justify-content: center;
    }
    #zoom-overlay.visible { display: flex; }
  </style>
</head>
<body>
  <div id="loading"><div class="spinner"></div><span>Chargement...</span></div>
  <div id="zoom-overlay"><div class="spinner"></div></div>
  <div id="scroll" style="display:none"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

    var params    = new URLSearchParams(location.search);
    var fileUrl   = params.get("file");
    var DPR       = window.devicePixelRatio || 1;
    var scroll    = document.getElementById("scroll");
    var loading   = document.getElementById("loading");
    var overlay   = document.getElementById("zoom-overlay");

    var currentZoomPct = parseFloat(params.get("zoom") || "100");
    var fitScale  = 1;
    var pdfDoc    = null;
    var rendering = false;

    // Returns the 1-based page number currently visible at the top of the scroll container.
    // Reads offsetTop from existing canvases — must be called BEFORE clearing innerHTML.
    function getCurrentPage() {
      var canvases = scroll.querySelectorAll("canvas");
      if (!canvases.length) return 1;
      var top = scroll.scrollTop;
      var best = 0;
      for (var i = 0; i < canvases.length; i++) {
        if (canvases[i].offsetTop <= top + 40) {
          best = i;
        } else {
          break;
        }
      }
      return best + 1;
    }

    // Waits for the browser to complete layout (one rAF is enough after all canvases appended).
    function waitFrame() {
      return new Promise(function(resolve) {
        requestAnimationFrame(function() {
          requestAnimationFrame(resolve); // two rAFs = fully committed layout
        });
      });
    }

    // Render all pages at `scale`. After layout is committed, jump to `targetPage`.
    async function renderAll(scale, targetPage) {
      if (rendering) return;
      rendering = true;
      overlay.classList.add("visible");

      // Clear and rebuild all canvases
      scroll.innerHTML = "";

      for (var i = 1; i <= pdfDoc.numPages; i++) {
        var page = await pdfDoc.getPage(i);
        var vp   = page.getViewport({ scale: scale * DPR });
        var canvas      = document.createElement("canvas");
        canvas.width      = Math.floor(vp.width);
        canvas.height     = Math.floor(vp.height);
        canvas.style.width  = Math.floor(vp.width  / DPR) + "px";
        canvas.style.height = Math.floor(vp.height / DPR) + "px";
        canvas.dataset.page = String(i);
        scroll.appendChild(canvas);
        await page.render({ canvasContext: canvas.getContext("2d"), viewport: vp }).promise;
      }

      // Let the browser commit the full layout before reading offsetTop
      await waitFrame();

      // Now offsetTop values are correct — jump to target page
      var target = scroll.querySelector('canvas[data-page="' + targetPage + '"]');
      if (target) {
        scroll.scrollTop = target.offsetTop;
      }

      overlay.classList.remove("visible");
      rendering = false;
    }

    async function load() {
      try {
        pdfDoc = await pdfjsLib.getDocument(fileUrl).promise;
        var firstPage = await pdfDoc.getPage(1);
        var vp1 = firstPage.getViewport({ scale: 1 });
        fitScale = (window.innerWidth - 24) / vp1.width;
        var finalScale = fitScale * (currentZoomPct / 100);
        loading.style.display = "none";
        scroll.style.display  = "flex";
        await renderAll(finalScale, 1);
      } catch(e) {
        loading.innerHTML =
          '<span style="color:#C8250E;padding:20px;text-align:center">Erreur : ' + e.message + '</span>';
      }
    }

    load();

    // Receive zoom from parent React component.
    // Capture current page BEFORE clearing DOM, restore AFTER layout.
    window.addEventListener("message", async function(e) {
      if (!e.data || e.data.type !== "setZoom") return;
      if (typeof e.data.zoom !== "number") return;
      if (!pdfDoc || rendering) return;

      var pageBeforeZoom = getCurrentPage(); // read while old canvases still in DOM
      currentZoomPct = e.data.zoom;
      var newScale = fitScale * (currentZoomPct / 100);
      await renderAll(newScale, pageBeforeZoom);
    });
  </script>
</body>
</html>
